<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Date</title>

  <link rel="icon" type="image/png" sizes="32x32"
    href="https://cdn.jsdelivr.net/gh/VuPhm/coop-date@main/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16"
    href="https://cdn.jsdelivr.net/gh/VuPhm/coop-date@main/favicon_io/favicon-16x16.png">
  <link rel="stylesheet" href="style.css">
  <link rel="apple-touch-icon" sizes="180x180"
    href="https://cdn.jsdelivr.net/gh/VuPhm/coop-date@main/favicon_io/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

</head>

<body>

  <div class="workspace">
    <main class="calc-board">
      <div class="brand-header-apple">
        <img class="brand-apple-logo"
          src="https://play-lh.googleusercontent.com/V5xKDYwb_ZVfGHPk21QWItCUekmtM7v-v41zZKyAEiKRgLrClWFVhY4kYFXEchA9ebZPVYt3RtxIp1c3P52JFLE=w480-h960-rw"
          alt="Logo"
          onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 1 1\' width=\'100\' height=\'100\'><rect width=\'1\' height=\'1\' fill=\'%23006633\'/></svg>';">
        <h1 class="brand-apple-title">Tra Cứu Thời Hạn Lùi Hàng</h1>
      </div>

      <div class="apple-chrono-line">
        <span class="chrono-line__label">Hôm nay:</span>
        <span class="chrono-line__value" id="widgetFullDate">---</span>
      </div>

      <div class="form-group" id="nsxGroup">
        <label class="form-group__label" for="nsx">Ngày sản xuất</label>
        <div class="input-wrapper">
          <input class="form-group__input auto-date" type="text" id="nsx" placeholder="dd/mm/yyyy" inputmode="numeric"
            maxlength="10">
          <button type="button" class="btn-picker-trigger" onclick="openNsxPicker()" aria-label="Chọn ngày">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </button>
          <input type="text" id="nsxHidden" class="hidden-picker">
        </div>
      </div>

      <div class="form-group" id="hsdGroup">
        <label class="form-group__label" for="hsdDate">Hạn sử dụng (Chọn ngày)</label>
        <div class="input-wrapper">
          <input class="form-group__input auto-date" type="text" id="hsdDate" placeholder="dd/mm/yyyy"
            inputmode="numeric" maxlength="10">
          <button type="button" class="btn-picker-trigger" onclick="openHsdPicker()" aria-label="Chọn ngày">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </button>
          <input type="text" id="hsdHidden" class="hidden-picker">
        </div>
      </div>

      <div class="divider-or">hoặc</div>

            <div class="apple-input-row">
                <div class="apple-input-col">
                    <label class="apple-col-label" for="hsdDays">Hạn sử dụng (Số ngày)</label>
                    <div class="apple-field-wrapper">
                        <input class="apple-core-input" type="number" id="hsdDays" placeholder="Ví dụ: 30" inputmode="numeric" min="1">
                        <span class="apple-field-suffix">ngày</span>
                    </div>
                </div>
                
                <div class="apple-input-col">
                    <label class="apple-col-label" for="hsdMonths">Hạn sử dụng (Số tháng)</label>
                    <div class="apple-field-wrapper">
                        <input class="apple-core-input" type="number" id="hsdMonths" placeholder="Ví dụ: 3" inputmode="numeric" min="1">
                        <span class="apple-field-suffix">tháng</span>
                    </div>
                </div>
            </div>

      <button class="btn-action" id="btnSubmit" onclick="executeCalculation()">Tra cứu</button>

      <div id="resultWrapper" class="calc-board__result-wrapper">
        <div id="resultText" class="calc-board__result-text"></div>
      </div>
    </main>

    <div id="diagramBoard" class="diagram-board">
      <h3 class="diagram-board__title">Sơ đồ trục thời hạn lùi hàng</h3>
      <div id="svgContainer"></div>
    </div>

    <section class="history-board">
      <h2 class="history-board__title">Lịch sử tra cứu</h2>
      <div class="controls">
        <div class="filter-tags">
          <span class="tag tag--all active" onclick="setFilter('all')">Tất cả</span>
          <span class="tag tag--safe" onclick="setFilter('safe')">An toàn</span>
          <span class="tag tag--warning" onclick="setFilter('warning')">Sắp tới hạn</span>
          <span class="tag tag--danger" onclick="setFilter('danger')">Quá hạn lùi</span>
          <span class="tag tag--short" onclick="setFilter('short')">Hàng ngắn ngày</span>
          <span class="tag tag--expired" onclick="setFilter('expired')">Đã hết HSD</span>
        </div>
        <button id="sortToggleBtn" class="sort-toggle-box" onclick="togglePrioritySort()">
          <svg viewBox="0 0 24 24">
            <polyline points="15 3 21 3 21 9"></polyline>
            <polyline points="9 21 3 21 3 15"></polyline>
            <line x1="21" y1="3" x2="14" y2="10"></line>
            <line x1="3" y1="21" x2="10" y2="14"></line>
          </svg>
          <span id="sortToggleText">Sắp xếp: Mặc định</span>
        </button>
      </div>
      <ul id="historyList" class="history-list">
        <li class="history-empty">Chưa có dữ liệu tra cứu</li>
      </ul>
    </section>
  </div>
  <div id="appVersionNote" class="app-version-note">Phiên bản: 1.0.0</div>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <script src="app.js" defer></script>
</body>

</html>
