<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Date</title>

    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.jsdelivr.net/gh/VuPhm/coop-date@main/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://cdn.jsdelivr.net/gh/VuPhm/coop-date@main/favicon_io/favicon-16x16.png">
    
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn.jsdelivr.net/gh/VuPhm/coop-date@main/favicon_io/apple-touch-icon.png">    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root {
            /* Hệ màu Brand 5-3-1-1 */
            --brand-primary: #006633;     /* Xanh lá đậm - Main Action/Bg */
            --brand-secondary: #93c11f;   /* Xanh lá sáng - Sub/Focus */
            --brand-accent-red: #e20514;  /* Đỏ - Nguy hiểm */
            --brand-accent-orange: #f29200; /* Cam - Cảnh báo */

            /* Cấu trúc nền tảng */
            --bg-base: #f4f6f4;
            --surface: #ffffff;
            --text-main: #1c261c;
            --text-sub: #667366;
                        
            /* Trạng thái phản hồi trực quan */
            --status-green-bg: #eff7f2;
            --status-green-border: rgba(0, 102, 51, 0.2);
            --status-green-text: var(--brand-primary);
            
            --status-yellow-bg: #fdf8f0;
            --status-yellow-border: rgba(242, 146, 0, 0.2);
            --status-yellow-text: var(--brand-accent-orange);
            
            --status-red-bg: #fdf3f3;
            --status-red-border: rgba(226, 5, 20, 0.15);
            --status-red-text: var(--brand-accent-red);
            
            --radius-box: 20px;
            --radius-item: 12px;
            --shadow: 0 8px 24px rgba(0, 66, 33, 0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

.workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            width: 100%;
            max-width: 850px;
            /* Cấu hình mặc định cho Mobile: Sơ đồ chèn giữa */
            grid-template-areas: 
                "calc"
                "diagram"
                "history";
        }
@media (min-width: 768px) {
            .workspace { 
                grid-template-columns: 1.1fr 1fr; 
                /* Cấu hình cho PC: Sơ đồ trải dài chiếm hết hàng dưới */
                grid-template-areas: 
                    "calc history"
                    "diagram diagram";
            }
        }
        .calc-board, .history-board {
            background: var(--surface);
            padding: 32px 24px;
            border-radius: var(--radius-box);
            box-shadow: var(--shadow);
            box-sizing: border-box;
        }
.calc-board { grid-area: calc; }
        .history-board { grid-area: history; }

        /* Khung chứa sơ đồ trục thời gian */
        .diagram-board {
            grid-area: diagram;
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius-box);
            box-shadow: var(--shadow);
            box-sizing: border-box;
            display: none; /* Chỉ hiển thị khi có dữ liệu tra cứu */
        }
        
        .diagram-board__title {
            margin: 0 0 16px 0;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* SVG Typography & Styling */
        .timeline-svg text {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            fill: var(--text-main);
        }
        .timeline-svg .sub-text {
            fill: var(--text-sub);
            font-size: 11px;
            font-weight: 500;
        }
        .timeline-svg .main-text {
            font-size: 12px;
            font-weight: 700;
        }
        .calc-board__title, .history-board__title {
            margin: 0 0 20px 0;
            font-size: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 16px;
            position: relative; /* Tạo tầng chứa cho lịch */
        }

        .form-group__label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-sub);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background-color: #fafafa;
            border: 1.5px solid #e5e5ea;
            border-radius: var(--radius-item);
            transition: all 0.2s ease;
            box-sizing: border-box;
            z-index: 2;
        }

.input-wrapper:focus-within {
            border-color: var(--brand-primary);
            background-color: var(--surface);
            box-shadow: 0 0 0 4px rgba(0, 102, 51, 0.1);
        }

        .form-group__input {
            flex: 1;
            padding: 12px 14px;
            font-size: 16px;
            border: none;
            background: transparent;
            outline: none;
            color: var(--text-main);
            width: 100%;
            box-sizing: border-box;
        }

        .input-wrapper--has-suffix .form-group__input {
            padding-right: 50px; /* Tạo khoảng trống an toàn cho hậu tố */
        }
        .input-suffix {
            position: absolute;
            right: 14px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-sub);
            user-select: none;
            pointer-events: none; /* Không cản trở hành vi click vào ô input */
        }

.btn-picker-trigger {
            background: transparent;
            border: none;
            padding: 0 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-picker-trigger svg {
            width: 18px;    /* Khóa cứng chiều rộng ngăn sập kích thước */
            height: 18px;   /* Khóa cứng chiều cao */
            fill: none;
            stroke: var(--brand-primary);
            stroke-width: 2; /* Tái thiết lập độ dày nét vẽ */
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.2s ease;
        }

        .btn-picker-trigger:active svg { 
            stroke: var(--brand-secondary); 
        }
        
        .hidden-picker {
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0;
            border: none;
            padding: 0;
            margin: 0;
            pointer-events: none;
        }

        .divider-or {
            text-align: center;
            margin: 14px 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sub);
            position: relative;
        }

        .divider-or::before, .divider-or::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background-color: #e5e5ea;
        }

        .divider-or::before { left: 0; }
        .divider-or::after { right: 0; }

        .btn-action {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            font-size: 16px;
            font-weight: 600;
            color: white;
background-color: var(--brand-primary);
            border: none;
            border-radius: var(--radius-item);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-action:hover { background-color: #005229; }
        .btn-action:active { transform: scale(0.97); }

        .calc-board__result-wrapper {
            margin-top: 24px;
            min-height: 74px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-item);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            background-color: transparent;
            box-sizing: border-box;
            padding: 12px 16px;
            border: 1px solid transparent;
        }

        .state-safe { background-color: var(--status-green-bg); border-color: var(--status-green-border); color: var(--status-green-text) !important; }
        .state-warning { background-color: var(--status-yellow-bg); border-color: var(--status-yellow-border); color: var(--status-yellow-text) !important; }
        .state-danger { background-color: var(--status-red-bg); border-color: var(--status-red-border); color: var(--status-red-text) !important; }

        .calc-board__result-text {
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            opacity: 0;
            transform: translateY(4px);
            transition: all 0.3s ease;
            line-height: 1.5;
        }

        .calc-board__result-text--visible { opacity: 1; transform: translateY(0); }

        .controls {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .filter-tags { display: flex; flex-wrap: wrap; gap: 8px; }

.tag {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #e5e5ea;
            background-color: #fafafa;
            color: var(--text-sub);
            transition: all 0.2s ease;
        }

        /* Đồng bộ phong cách Filled cho từng trạng thái Active */
        .tag--all.active { 
            color: white !important; 
            background-color: var(--brand-primary);
            border-color: var(--brand-primary); 
        }
        
        .tag--safe.active { 
            color: white !important; 
            background-color: var(--brand-primary); 
            border-color: var(--brand-primary); 
        }
        
        .tag--warning.active { 
            color: white !important; 
            background-color: var(--brand-accent-orange); 
            border-color: var(--brand-accent-orange); 
        }
        
        .tag--danger.active { 
            color: white !important; 
            background-color: var(--brand-accent-red); 
            border-color: var(--brand-accent-red); 
        }

        .tag--short.active { 
            color: white !important; 
            background-color: #667366; /* Màu xám rêu trung tính phân tách hoàn toàn với 3 màu cốt lõi */
            border-color: #667366; 
        }
        /* Nút Sort khi active cũng được fill màu theo ngôn ngữ chung */
        .sort-toggle-box {
            width: 100%;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #e5e5ea;
            border-radius: var(--radius-item);
            background-color: #fafafa;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .sort-toggle-box.active { 
            background-color: var(--brand-primary);
            border-color: var(--brand-primary);
            color: white; 
        }

        .sort-toggle-box svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .history-list { list-style: none; padding: 0; margin: 0; max-height: 320px; overflow-y: auto; }
        .history-item { padding: 12px; border-radius: var(--radius-item); margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s ease; }
        .history-item:hover { opacity: 0.85; transform: translateX(2px); }
        .history-item__meta { font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
        .history-item__result { font-size: 14px; font-weight: 600; }
        .history-empty { font-size: 14px; color: var(--text-sub); text-align: center; padding: 40px 0; }

        /* KHỐI SỬA ĐỔI ĐỊNH VỊ CHUẨN XÁC DƯỚI INPUT TRƯỜNG */
        .flatpickr-calendar { 
            position: absolute !important;
            top: 100% !important;
            left: 0 !important;
            transform: none !important;
            border-radius: 12px !important; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.12) !important; 
            border: 1px solid #e5e5ea !important;
            margin-top: 6px !important;
            z-index: 9999 !important;
        }
        
        /* Loại bỏ mũi tên nhọn thừa thãi gây lệch bố cục */
        .flatpickr-calendar.arrowTop:before,
        .flatpickr-calendar.arrowTop:after { display: none !important; }

        /* Tái định dạng khối chứa Brand Header */
        .brand-header--asymmetric {
            display: flex;
            align-items: center;
            width: 100%;
            height: 80px; /* Khóa cứng chiều cao để kiểm soát gradient */
            margin-bottom: 24px;
            border-radius: var(--radius-box); /* Khung bo tròn bên ngoài */
            background: linear-gradient(135deg, #ffffff 30%, #ecf1ed 100%); /* Gradient nền nhẹ tổng thể */
            overflow: hidden; /* Cắt các phần thừa ra ngoài khung bo tròn */
            box-shadow: 0 4px 12px rgba(0, 66, 33, 0.03); /* Bóng đổ mờ nhẹ */
        }

.brand-header--asymmetric {
            display: flex;
            align-items: center;
            width: 100%;
            height: 80px;
            margin-bottom: 24px;
            background: transparent; /* Loại bỏ nền tổng thể */
        }

        .brand-side--logo {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-right: 12px;
        }
        
        .brand-logo {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--surface);
            box-shadow: 0 4px 12px rgba(0, 66, 33, 0.08);
        }

/* Định hình khối chứa Brand theo chuẩn Apple Container */
        .brand-header-apple {
            display: flex;
            align-items: center;
            gap: 16px; /* Khoảng cách chuẩn giữa glyph và text theo iOS HIG */
            padding: 14px 18px;
            margin-bottom: 24px;
            border-radius: var(--radius-box); /* Bo tròn đồng điệu với calc-board */
            background: radial-gradient(circle at 50% 50%, #f9fbf9 0%, #f1f6f2 100%);
            border: 1px solid rgba(0, 102, 51, 0.06);
            box-sizing: border-box;
        }

        /* Khóa cứng kích thước Avatar/Logo dạng hình học phẳng */
        .brand-apple-logo {
            width: 48px;  /* Kích thước tap target lý tưởng tối thiểu của Apple */
            height: 48px;
            object-fit: cover;
            border-radius: 12px; /* Bo góc squircle nhẹ theo tỷ lệ bo phần cứng */
            border: 1px solid rgba(0, 0, 0, 0.04);
            flex-shrink: 0; /* Tuyệt đối không cho phép bóp méo logo khi co giãn màn hình */
        }

        /* Tiêu đề co giãn linh hoạt tự do */
        .brand-apple-title {
            flex: 1; /* Chiếm trọn không gian còn lại */
            margin: 0;
            font-size: 18px;
            font-weight: 650; /* Cân bằng giữa Bold và Semibold của font SF Pro */
            color: var(--brand-primary);
            letter-spacing: -0.4px; /* Khít ký tự đặc trưng của Typography iOS */
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Khối Widget Lịch iOS */
        .apple-chrono-widget {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            margin-bottom: 20px;
            background-color: var(--surface);
            border: 1px solid rgba(0, 102, 51, 0.08);
            border-radius: var(--radius-item);
            box-shadow: 0 2px 8px rgba(0, 66, 33, 0.02);
        }

/* Dòng trạng thái lịch tối giản */
        .apple-chrono-line {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: -4px 0 16px 4px; /* Sử dụng margin âm để kéo sát khoảng cách giữa Brand và Field */
            font-size: 13px;
            font-weight: 500;
            user-select: none;
        }

        .chrono-line__label {
            color: var(--brand-primary);
            font-weight: 600;
        }

        .chrono-line__value {
            color: var(--text-main);
        }

        /* Tag Đã hết HSD khi active */
        .tag--expired.active { 
            color: white !important; 
            background-color: #555555 !important; 
            border-color: #555555 !important; 
        }

        /* Hộp kết quả và Thẻ lịch sử khi ở trạng thái Quá Hạn HSD */
        .state-expired { 
            background-color: #f5f5f5 !important; 
            border-color: rgba(85, 85, 85, 0.2) !important; 
            color: #555555 !important; 
        }
        </style>
</head>
<body>

<div class="workspace">
        <main class="calc-board">
            <div class="brand-header-apple">
                <img class="brand-apple-logo" 
                     src="https://play-lh.googleusercontent.com/V5xKDYwb_ZVfGHPk21QWItCUekmtM7v-v41zZKyAEiKRgLrClWFVhY4kYFXEchA9ebZPVYt3RtxIp1c3P52JFLE=w480-h960-rw" 
                     alt="Logo" 
                     onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 1 1\' width=\'100\' height=\'100\'><rect width=\'1\' height=\'1\' fill=\'%23006633\'/></svg>';">
                <h1 class="brand-apple-title">Tra Cứu Thời Hạn Lùi Hàng</h1>
            </div>

            <div class="apple-chrono-line">
                <span class="chrono-line__label">Hôm nay:</span>
                <span class="chrono-line__value" id="widgetFullDate">---</span>
            </div>
            
            <div class="form-group" id="nsxGroup">
                <label class="form-group__label" for="nsx">Ngày sản xuất</label>
                <div class="input-wrapper">
                    <input class="form-group__input auto-date" type="text" id="nsx" placeholder="dd/mm/yyyy" inputmode="numeric" maxlength="10">
                    <button type="button" class="btn-picker-trigger" onclick="openNsxPicker()" aria-label="Chọn ngày">
                        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    </button>
                    <input type="text" id="nsxHidden" class="hidden-picker">
                </div>
            </div>

            <div class="form-group" id="hsdGroup">
                <label class="form-group__label" for="hsdDate">Hạn sử dụng (Chọn ngày)</label>
                <div class="input-wrapper">
                    <input class="form-group__input auto-date" type="text" id="hsdDate" placeholder="dd/mm/yyyy" inputmode="numeric" maxlength="10">
                    <button type="button" class="btn-picker-trigger" onclick="openHsdPicker()" aria-label="Chọn ngày">
                        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    </button>
                    <input type="text" id="hsdHidden" class="hidden-picker">
                </div>
            </div>

            <div class="divider-or">hoặc</div>

            <div class="form-group">
                <label class="form-group__label" for="hsdDays">Hạn sử dụng (Số ngày tính từ NSX)</label>
                <div class="input-wrapper input-wrapper--has-suffix">
                    <input class="form-group__input" type="number" id="hsdDays" placeholder="Ví dụ: 30" inputmode="numeric" min="1">
                    <span class="input-suffix">ngày</span>
                </div>
            </div>

            <button class="btn-action" id="btnSubmit" onclick="executeCalculation()">Tra cứu</button>

            <div id="resultWrapper" class="calc-board__result-wrapper">
                <div id="resultText" class="calc-board__result-text"></div>
            </div>
        </main>

        <div id="diagramBoard" class="diagram-board">
            <h3 class="diagram-board__title">Sơ đồ trục thời hạn lùi hàng</h3>
            <div id="svgContainer"></div>
        </div>

        <section class="history-board">
            <h2 class="history-board__title">Lịch sử tra cứu</h2>
            <div class="controls">
<div class="filter-tags">
                    <span class="tag tag--all active" onclick="setFilter('all')">Tất cả</span>
                    <span class="tag tag--safe" onclick="setFilter('safe')">An toàn</span>
                    <span class="tag tag--warning" onclick="setFilter('warning')">Sắp tới hạn</span>
                    <span class="tag tag--danger" onclick="setFilter('danger')">Quá hạn lùi</span>
                    <span class="tag tag--short" onclick="setFilter('short')">Hàng ngắn ngày</span>
                    <span class="tag tag--expired" onclick="setFilter('expired')">Đã hết HSD</span>
                </div>
                                <button id="sortToggleBtn" class="sort-toggle-box" onclick="togglePrioritySort()">
                    <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                    <span id="sortToggleText">Sắp xếp: Mặc định</span>
                </button>
            </div>
            <ul id="historyList" class="history-list">
                <li class="history-empty">Chưa có dữ liệu tra cứu</li>
            </ul>
        </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
const MS_PER_DAY = 1000 * 60 * 60 * 24;
const historyData = [];
let currentFilter = 'all';
let isPrioritySort = false;
let nsxFlatpickr, hsdFlatpickr;
let isSyncing = false; // Cờ hiệu ngăn vòng lặp đồng bộ vô hạn

// --- MASK ĐỊNH DẠNG TEXT INPUT CHO DI ĐỘNG ---
document.querySelectorAll('.auto-date').forEach(input => {
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); executeCalculation(); return; }
        if (['Backspace', 'Tab', 'ArrowLeft', 'ArrowRight', 'Delete'].includes(e.key)) return;
        if (!/[0-9]/.test(e.key)) e.preventDefault();
    });
    input.addEventListener('input', () => {
        let value = input.value.replace(/\D/g, '');
        if (value.length > 2 && value.length <= 4) {
            value = `${value.slice(0, 2)}/${value.slice(2)}`;
        } else if (value.length > 4) {
            value = `${value.slice(0, 2)}/${value.slice(2, 4)}/${value.slice(4, 8)}`;
        }
        input.value = value;
    });
});

// --- HỆ THỐNG ĐỒNG BỘ CÓ TƯỜNG NGĂN (GUARDED SYNCHRONIZATION) ---
function isValidDateStr(str) {
    if (!str || str.length !== 10) return false;
    const parts = str.split('/');
    if (parts.length !== 3) return false;
    const d = parseInt(parts[0], 10);
    const m = parseInt(parts[1], 10);
    const y = parseInt(parts[2], 10);
    if (isNaN(d) || isNaN(m) || isNaN(y)) return false;
    if (m < 1 || m > 12 || d < 1 || d > 31) return false;
    return true;
}

function syncFromDateToDays() {
    if (isSyncing) return;
    isSyncing = true;

    const nsxVal = document.getElementById('nsx').value.trim();
    const hsdDateVal = document.getElementById('hsdDate').value.trim();
    const hsdDaysInput = document.getElementById('hsdDays');

    if (isValidDateStr(nsxVal) && isValidDateStr(hsdDateVal)) {
        const nsxDate = parseLocalDate(nsxVal);
        const hsdDate = parseLocalDate(hsdDateVal);
        // Tính trọn gói: cộng 1 ngày đầu tiên
        const diffDays = Math.round((hsdDate - nsxDate) / MS_PER_DAY) + 1;
        hsdDaysInput.value = diffDays > 0 ? diffDays : "";
    } else {
        hsdDaysInput.value = "";
    }
    
    isSyncing = false;
}

function syncFromDaysToDate() {
    if (isSyncing) return;
    isSyncing = true;

    const nsxVal = document.getElementById('nsx').value.trim();
    const hsdDaysVal = document.getElementById('hsdDays').value.trim();
    const hsdDateInput = document.getElementById('hsdDate');

    if (isValidDateStr(nsxVal) && hsdDaysVal !== "" && !isNaN(hsdDaysVal)) {
        const nsxDate = parseLocalDate(nsxVal);
        const days = parseInt(hsdDaysVal, 10);
        if (days > 0) {
            // Ngược lại, ngày kết thúc bằng ngày sản xuất + số ngày - 1
            const computedHsdDate = new Date(nsxDate.getTime() + (days - 1) * MS_PER_DAY);
            const formatted = formatLocalDate(computedHsdDate);
            hsdDateInput.value = formatted;
            if (hsdFlatpickr) hsdFlatpickr.setDate(computedHsdDate, false);
        } else {
            hsdDateInput.value = "";
            if (hsdFlatpickr) hsdFlatpickr.clear();
        }
    } else {
        hsdDateInput.value = "";
        if (hsdFlatpickr) hsdFlatpickr.clear();
    }

    isSyncing = false;
}

// --- LOGIC NGHIỆP VỤ HẠN LÙI ---
function parseLocalDate(dateString) {
    const [day, month, year] = dateString.split('/');
    return new Date(year, month - 1, day, 0, 0, 0, 0);
}

function formatLocalDate(dateObj) {
    const d = String(dateObj.getDate()).padStart(2, '0');
    const m = String(dateObj.getMonth() + 1).padStart(2, '0');
    const y = dateObj.getFullYear();
    return `${d}/${m}/${y}`;
}

function formatRemainingText(days) {
    if (days < 0) return `Đã trễ ${Math.abs(days)} ngày`;
    if (days === 0) return `Hết hạn hôm nay`;
    return `HSD còn ${days} ngày`;
}

function processReturnBusinessLogic(nsxStr, hsdDateStr) {
    const nsxDate = parseLocalDate(nsxStr);
    const hsdDate = parseLocalDate(hsdDateStr);
    const shelfLifeDays = Math.round((hsdDate - nsxDate) / MS_PER_DAY) + 1;
    if (shelfLifeDays <= 0) throw new Error("Hạn sử dụng không thể nhỏ hơn ngày sản xuất.");
    
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const daysRemainingShelfLife = Math.round((hsdDate - today) / MS_PER_DAY) + 1;
    
    // TRẠNG THÁI TỐI THƯỢNG: Kiểm tra Quá hạn sử dụng trước tiên cho TẤT CẢ các loại sản phẩm
    if (daysRemainingShelfLife <= 0) {
        // Cách tính ngày lùi vẫn giữ nguyên như cũ không đổi
        const dayThreshold20 = Math.round(shelfLifeDays * 0.2);
        let returnDate = shelfLifeDays < 10 ? hsdDate : new Date(hsdDate.getTime() - (dayThreshold20 - 1) * MS_PER_DAY - 1 * MS_PER_DAY);
        
        return {
            isExpiredProduct: true, // Cờ hiệu quá hạn sử dụng
            isShortProduct: shelfLifeDays < 10,
            formattedHsd: formatLocalDate(hsdDate),
            dateStr: formatLocalDate(returnDate),
            daysRemaining: daysRemainingShelfLife,
            alert: { class: 'state-expired', label: 'Đã hết HSD', weight: 0, type: 'expired' }
        };
    }
    
    // Luồng hàng ngắn ngày (< 10 ngày) còn hạn
    if (shelfLifeDays < 10) {
        return {
            isExpiredProduct: false,
            isShortProduct: true,
            formattedHsd: formatLocalDate(hsdDate),
            dateStr: formatLocalDate(hsdDate),
            daysRemaining: daysRemainingShelfLife,
            alert: { class: 'state-safe', label: 'An toàn', weight: 3, type: 'safe' }
        };
    }
    
    // Luồng hàng dài ngày (>= 10 ngày) còn hạn
    const dayThreshold20 = Math.round(shelfLifeDays * 0.2);
    const dayThreshold40 = Math.round(shelfLifeDays * 0.4);
    let returnDate = new Date(hsdDate.getTime() - (dayThreshold20 - 1) * MS_PER_DAY - 1 * MS_PER_DAY);
    const daysToReturnDate = Math.round((returnDate - today) / MS_PER_DAY);
    
    let alertState;
    if (daysToReturnDate < 0) {
        alertState = { class: 'state-danger', label: 'Đã qua hạn lùi', weight: 1, type: 'danger' };
    } else if (daysToReturnDate === 0) {
        alertState = { class: 'state-danger', label: 'Đến hạn lùi hàng', weight: 1, type: 'danger' };
    } else if (daysToReturnDate <= (dayThreshold40 - dayThreshold20)) {
        alertState = { class: 'state-warning', label: 'Sắp tới hạn lùi', weight: 2, type: 'warning' };
    } else {
        alertState = { class: 'state-safe', label: 'An toàn', weight: 3, type: 'safe' };
    }
    
    return {
        isExpiredProduct: false,
        isShortProduct: false,
        formattedHsd: formatLocalDate(hsdDate),
        dateStr: formatLocalDate(returnDate),
        daysRemaining: daysRemainingShelfLife,
        alert: alertState
    };
}

// --- PIPELINE HIỂN THỊ ---
function setFilter(filterType) {
    currentFilter = filterType;
    document.querySelectorAll('.filter-tags .tag').forEach(tag => tag.classList.remove('active'));
    document.querySelector(`.tag--${filterType}`).classList.add('active');
    updateHistoryUI();
}

function togglePrioritySort() {
    isPrioritySort = !isPrioritySort;
    const btn = document.getElementById('sortToggleBtn');
    const txt = document.getElementById('sortToggleText');
    btn.classList.toggle('active', isPrioritySort);
    txt.innerText = isPrioritySort ? "Sắp xếp: Ưu tiên hạn lùi" : "Sắp xếp: Mặc định";
    updateHistoryUI();
}

function updateHistoryUI() {
    const container = document.getElementById('historyList');
    let displayData = [...historyData];
    
    if (currentFilter !== 'all') displayData = displayData.filter(item => item.alertType === currentFilter);
    if (isPrioritySort) displayData.sort((a, b) => a.alertWeight - b.alertWeight);
    
    if (displayData.length === 0) {
        container.innerHTML = '<li class="history-empty">Không có dữ liệu phù hợp</li>';
        return;
    }
    container.innerHTML = displayData.map(item => {
        const labelPrefix = item.isShortProduct ? 'HSD' : 'Ngày lùi';
        
        // NỘI DUNG BOX HISTORY: Kiểm tra nếu đã hết HSD thì gán chuỗi đặc biệt theo yêu cầu
        const remainingText = item.isExpiredProduct ? 'Đã hết HSD' : formatRemainingText(item.daysRemaining);
        const alertLabelText = item.isExpiredProduct ? 'Đã qua hạn lùi' : item.alertLabel;
        
        return `
            <li class="history-item ${item.alertClass}" onclick="loadHistoryItem('${item.nsx}', '${item.formattedHsd}', '${item.rawHsdDays}')">
                <div class="history-item__meta">NSX: ${item.nsx} | HSD: ${item.formattedHsd}</div>
                <div class="history-item__result">${labelPrefix}: ${item.result} (${alertLabelText}) | ${remainingText}</div>
            </li>
        `;
    }).join('');
}

function loadHistoryItem(nsx, hsdDate, hsdDays) {
    document.getElementById('nsx').value = nsx;
    if (nsxFlatpickr) nsxFlatpickr.setDate(nsx, false);
    
    document.getElementById('hsdDate').value = hsdDate;
    if (hsdFlatpickr) hsdFlatpickr.setDate(hsdDate, false);
    
    document.getElementById('hsdDays').value = hsdDays;
    executeCalculation(false); 
}

function executeCalculation(saveToHistory = true) {
    const nsxVal = document.getElementById('nsx').value.trim();
    const hsdDateVal = document.getElementById('hsdDate').value.trim();
    const hsdDaysVal = document.getElementById('hsdDays').value.trim();
    const wrapper = document.getElementById('resultWrapper');
    const text = document.getElementById('resultText');
    
    text.classList.remove('calc-board__result-text--visible');
    setTimeout(() => {
        try {
            if (!nsxVal) throw new Error("Chưa nhập ngày sản xuất.");
            if (!hsdDateVal) throw new Error("Chưa xác định được ngày hạn sử dụng.");
            
            const output = processReturnBusinessLogic(nsxVal, hsdDateVal);
            drawTimelineDiagram(nsxVal, hsdDateVal, output.dateStr);

            wrapper.className = `calc-board__result-wrapper ${output.alert.class}`;
            
            // NỘI DUNG BOX KẾT QUẢ CHÍNH
            if (output.isExpiredProduct) {
                const labelTitle = output.isShortProduct ? 'Hạn sử dụng' : 'Ngày lùi hàng';
                text.innerHTML = `${labelTitle}: ${output.dateStr}<br>
                                  <small style="font-weight:700; color:#555555;">[${output.alert.label}]</small>`;
            } else if (output.isShortProduct) {
                text.innerHTML = `Hạn sử dụng: ${output.dateStr}<br>
                                  <small style="font-weight:500; opacity:0.9;">[${output.alert.label}] — Sử dụng đến hết ngày ${output.dateStr}</small>`;
            } else {
                text.innerHTML = `Ngày lùi hàng: ${output.dateStr}<br>
                                  <small style="font-weight:500; opacity:0.9;">[${output.alert.label}] — HSD còn ${output.daysRemaining} ngày</small>`;
            }
            
            if (saveToHistory) {
                const existingIndex = historyData.findIndex(h => h.nsx === nsxVal && h.formattedHsd === output.formattedHsd);
                if (existingIndex !== -1) historyData.splice(existingIndex, 1);
                
                historyData.unshift({ 
                    nsx: nsxVal, 
                    rawHsdDate: hsdDateVal,
                    rawHsdDays: hsdDaysVal || Math.round((parseLocalDate(hsdDateVal) - parseLocalDate(nsxVal)) / MS_PER_DAY),
                    formattedHsd: output.formattedHsd,
                    result: output.dateStr,
                    daysRemaining: output.daysRemaining,
                    alertClass: output.alert.class,
                    alertLabel: output.alert.label,
                    alertType: output.alert.type, // Bộ lọc 'expired' sẽ ăn theo loại này
                    alertWeight: output.alert.weight,
                    isShortProduct: output.isShortProduct,
                    isExpiredProduct: output.isExpiredProduct // Lưu trữ cờ hiệu quá hạn vào mảng lịch sử
                });
                updateHistoryUI();
            }
        } catch (error) {
            wrapper.className = 'calc-board__result-wrapper state-danger';
            text.innerHTML = error.message;
        }
        text.classList.add('calc-board__result-text--visible');
    }, 150);
}
    function drawTimelineDiagram(nsxStr, hsdStr, returnStr) {
    const board = document.getElementById('diagramBoard');
    const container = document.getElementById('svgContainer');
    board.style.display = 'block';

    const nsx = parseLocalDate(nsxStr);
    const hsd = parseLocalDate(hsdStr);
    const today = new Date(); today.setHours(0,0,0,0);

    const totalDays = Math.round((hsd - nsx) / MS_PER_DAY) + 1;
    const todayIndex = Math.round((today - nsx) / MS_PER_DAY) + 1;
    
    // Tọa độ biên biên phẳng
    const startX = 40;
    const endX = 560;
    const widthX = endX - startX;
    
    // Nâng trục Y xuống tâm thấp hơn để nhường không gian cho chữ cỡ lớn phía trên
    const y = 55; 

    const getX = (dayIndex) => {
        if (totalDays <= 0) return startX;
        const pct = dayIndex / totalDays;
        const clamped = Math.max(0, Math.min(1, pct));
        return startX + clamped * widthX;
    };

    const todayX = getX(todayIndex);
    const colorSafe = '#006633';    
    const colorDanger = '#e20514';  
    const colorPast = '#86868b';    

    // NHÁNH 1: Sản phẩm ngắn ngày (< 10 ngày)
    if (totalDays < 10) {
        const isExpired = (totalDays - todayIndex) < 0;
        const mainColor = isExpired ? colorDanger : colorSafe;

        container.innerHTML = `
            <svg class="timeline-svg" viewBox="0 0 600 130" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                <line x1="${startX}" y1="${y}" x2="${endX}" y2="${y}" stroke="${mainColor}" stroke-width="8" stroke-linecap="round"/>
                
                ${todayIndex > 0 ? `<line x1="${startX}" y1="${y}" x2="${Math.min(endX, todayX)}" y2="${y}" stroke="${colorPast}" stroke-width="8" stroke-opacity="0.85"/>` : ''}
                
                <text x="${(startX + endX) / 2}" y="${y - 16}" style="font-size: 14px; font-weight: 800;" fill="${mainColor}" text-anchor="middle">Tổng HSD: ${totalDays} ngày</text>

                <circle cx="${startX}" cy="${y}" r="7" fill="#ffffff" stroke="${colorSafe}" stroke-width="3.5" />
                <text x="${startX}" y="${y + 26}" style="font-size: 13px; font-weight: 600;" fill="#1c261c" text-anchor="middle">NSX</text>
                <text x="${startX}" y="${y + 42}" style="font-size: 13px; font-weight: 700;" fill="#667366" text-anchor="middle">${nsxStr.slice(0,5)}</text>

                <circle cx="${endX}" cy="${y}" r="7" fill="#ffffff" stroke="${mainColor}" stroke-width="3.5" />
                <text x="${endX}" y="${y + 26}" style="font-size: 13px; font-weight: 800;" fill="${mainColor}" text-anchor="middle">HSD</text>
                <text x="${endX}" y="${y + 42}" style="font-size: 13px; font-weight: 700;" fill="#667366" text-anchor="middle">${hsdStr.slice(0,5)}</text>

                ${todayIndex >= 0 && todayIndex <= totalDays ? `
                    <g>
                        <line x1="${todayX}" y1="${y - 22}" x2="${todayX}" y2="${y + 22}" stroke="#1c261c" stroke-width="2" stroke-dasharray="3,3"/>
                        <circle cx="${todayX}" cy="${y}" r="5" fill="#1c261c"/>
                        <text x="${todayX}" y="${y - 28}" style="font-size: 13px; font-weight: 800;" text-anchor="middle" fill="#1c261c">Hôm nay (${today.getDate()}/${today.getMonth() + 1})</text>
                    </g>
                ` : ''}
            </svg>
        `;
        return;
    }

    // NHÁNH 2: Sản phẩm dài ngày (>= 10 ngày)
    const dayThreshold20 = Math.round(totalDays * 0.2);
    const dayThreshold40 = Math.round(totalDays * 0.4);
    const mốc_40 = totalDays - dayThreshold40;
    const mốc_20 = totalDays - dayThreshold20;
    
    const x_40 = getX(mốc_40);
    const x_20 = getX(mốc_20);
    const colorWarning = '#f29200'; 

    container.innerHTML = `
        <svg class="timeline-svg" viewBox="0 0 600 130" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            
            <line x1="${startX}" y1="${y}" x2="${x_40}" y2="${y}" stroke="${colorSafe}" stroke-width="8" stroke-linecap="butt"/>
            <line x1="${x_40}" y1="${y}" x2="${x_20}" y2="${y}" stroke="${colorWarning}" stroke-width="14" stroke-linecap="butt"/>
            <line x1="${x_20}" y1="${y}" x2="${endX}" y2="${y}" stroke="${colorDanger}" stroke-width="14" stroke-linecap="butt"/>
            
            ${todayIndex > 0 ? `<line x1="${startX}" y1="${y}" x2="${Math.min(x_40, todayX)}" y2="${y}" stroke="${colorPast}" stroke-width="8" stroke-opacity="0.85"/>` : ''}
            ${todayIndex > mốc_40 ? `<line x1="${x_40}" y1="${y}" x2="${Math.min(x_20, todayX)}" y2="${y}" stroke="${colorPast}" stroke-width="14" stroke-opacity="0.85"/>` : ''}
            ${todayIndex > mốc_20 ? `<line x1="${x_20}" y1="${y}" x2="${Math.min(endX, todayX)}" y2="${y}" stroke="${colorPast}" stroke-width="14" stroke-opacity="0.85"/>` : ''}

            <text x="${(startX + x_40) / 2}" y="${y - 16}" style="font-size: 13px; font-weight: 800;" fill="${colorSafe}" text-anchor="middle">${mốc_40} ngày</text>
            <text x="${(x_40 + x_20) / 2}" y="${y - 18}" style="font-size: 13px; font-weight: 800;" fill="${colorWarning}" text-anchor="middle">${dayThreshold40 - dayThreshold20} ngày</text>
            <text x="${(x_20 + endX) / 2}" y="${y - 18}" style="font-size: 13px; font-weight: 800;" fill="${colorDanger}" text-anchor="middle">${dayThreshold20} ngày</text>

            <circle cx="${startX}" cy="${y}" r="7" fill="#ffffff" stroke="${colorSafe}" stroke-width="3.5" />
            <text x="${startX}" y="${y + 26}" style="font-size: 13px; font-weight: 600;" fill="#1c261c" text-anchor="middle">NSX</text>
            <text x="${startX}" y="${y + 42}" style="font-size: 13px; font-weight: 700;" fill="#667366" text-anchor="middle">${nsxStr.slice(0,5)}</text>

            <circle cx="${x_40}" cy="${y}" r="5" fill="#ffffff" stroke="${colorWarning}" stroke-width="2.5" />
            <text x="${x_40}" y="${y + 26}" style="font-size: 12px; font-weight: 700;" fill="${colorWarning}" text-anchor="middle">Mốc 40%</text>

            <circle cx="${x_20}" cy="${y}" r="7" fill="#ffffff" stroke="${colorDanger}" stroke-width="3.5" />
            <text x="${x_20}" y="${y + 26}" style="font-size: 14px; font-weight: 800;" fill="${colorDanger}" text-anchor="middle">Hạn lùi</text>
            <text x="${x_20}" y="${y + 42}" style="font-size: 13px; font-weight: 700;" fill="#667366" text-anchor="middle">${returnStr.slice(0,5)}</text>

            <circle cx="${endX}" cy="${y}" r="7" fill="#ffffff" stroke="#667366" stroke-width="3.5" />
            <text x="${endX}" y="${y + 26}" style="font-size: 13px; font-weight: 600;" fill="#1c261c" text-anchor="middle">HSD</text>
            <text x="${endX}" y="${y + 42}" style="font-size: 13px; font-weight: 700;" fill="#667366" text-anchor="middle">${hsdStr.slice(0,5)}</text>

            ${todayIndex >= 0 && todayIndex <= totalDays ? `
                <g>
                    <line x1="${todayX}" y1="${y - 22}" x2="${todayX}" y2="${y + 22}" stroke="#1c261c" stroke-width="2" stroke-dasharray="3,3"/>
                    <circle cx="${todayX}" cy="${y}" r="5" fill="#1c261c"/>
                    <text x="${todayX}" y="${y - 28}" style="font-size: 13px; font-weight: 800;" text-anchor="middle" fill="#1c261c">Hôm nay (${today.getDate()}/${today.getMonth() + 1})</text>
                </g>
            ` : ''}
        </svg>
    `;
}
